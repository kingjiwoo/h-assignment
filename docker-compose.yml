services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ctgov-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # hot reload용 소스 마운트 (이미지의 /app/app 를 덮어씀)
      - ./app:/app/app
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ctgov-frontend
    environment:
      # 브라우저에서 백엔드 호출 → 호스트 노출 포트 사용
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.mjs:/app/next.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      # node_modules는 named volume으로 격리 (호스트 것 덮어쓰지 않게)
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
